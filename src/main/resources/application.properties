spring.application.name=Bono_Vendedor_Skyworth
# Base de datos
spring.datasource.url=jdbc:postgresql://localhost/db_bono_skyworth?characterEncoding=UTF-8
spring.datasource.username=postgres
spring.datasource.password=vecom123.
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/La_Paz
spring.jpa.properties.hibernate.format_sql=true

# Servidor
server.port=7001    
server.servlet.context-path=/api

# JWT
jwt.secret=TokenSecret-123456$-SKYWORTH-2026-SecureKey
jwt.expiration-ms=31536000000

# Uploads
app.upload.dir=uploads

# Swagger / SpringDoc
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.disable-swagger-default-url=false
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.use-management-port=false

# File Upload Limits
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=35MB

# Logging
logging.level.com.ninabit.smaf=DEBUG

# Disable open-in-view warning
spring.jpa.open-in-view=false

# Spring Data Pageable Limits (for bulk exports)
spring.data.web.pageable.max-page-size=10000


app.frontend.url=https://bono.skyworth.bo

# URL Permitidas del Frontend (Para producción bono.contabol.com)
app.cors.allowed-origins=http://localhost:5173,http://localhost:8080,https://bono.contabol.com,https://bono.skyworth.bo

# ===================================================================
# LOGGING (BITACORA PROFESIONAL E HISTORIAL ROTATIVO)
# ===================================================================
# Archivo base de los logs
logging.file.name=logs/skyworth.log
# Nivel del logging de la aplicacion (INFO es el estandar para ver todo lo general y los requests)
logging.level.com.ninabit.bono=INFO
# Retencion del archivo: si llega a 10MB lo empaca e inicia otro (para evitar llenar disco por siempre)
logging.logback.rollingpolicy.max-file-size=10MB
# Cuantos dias antes de borrar los zips
logging.logback.rollingpolicy.max-history=30
logging.logback.rollingpolicy.file-name-pattern=logs/skyworth-%d{yyyy-MM-dd}.%i.log.gz